name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          cp index.html favicon.svg app-icon.svg app-icon-180.png app-icon-192.png app-icon-512.png manifest.webmanifest 404.html robots.txt sitemap.xml despre-noi.html servicii.html proiecte.html de-ce-noi.html contact.html search.html shop.html faq.html confidentialitate.html _site/
          [ -f _redirects ] && cp _redirects _site/
          cp -r css js projects blog _site/
          test -f _site/index.html
          test -d _site/projects
          test -d _site/blog
          echo "Files to publish:"
          find _site -type f | wc -l

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true
